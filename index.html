<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>quickglobe – Repository Index</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="msapplication-config" content="browserconfig.xml">
<meta name="msapplication-TileColor" content="#f4efe4">
<meta name="theme-color" content="#e9edf3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Jura:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14223b;
    --ink-soft:#5d6b82;
    --blue:#2f5fd0;
    --blue-soft:#e2eafb;
    --grid:#c9d2e0;
    --grid-major:#8ea5bf;
    --paper:#e9edf3;
    --cream:#faf7ee;
    --cream-2:#f1ebdd;
    --sans:"Space Grotesk",system-ui,sans-serif;
    --mono:"Space Mono",ui-monospace,monospace;
    --accent:"Jura",sans-serif;
    --accent-size:0.74;   /* Jura size factor (0.92) x accent scale (0.8) */
    --cell:26px;
    color-scheme:light;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);color:var(--ink);
    -webkit-font-smoothing:antialiased;
    background-color:var(--paper);
    /* Single repeating gradient per axis: minor lines every cell, a bolder
       major line at the start of every 5-cell period. Keeping minor + major in
       ONE layer (rather than two layers with separate background-sizes) means
       they share a single tile, so the major lines can't drift out of
       alignment with the minor ones as you scroll down a fractional grid. */
    background-image:
      repeating-linear-gradient(to right,
        var(--grid-major) 0, var(--grid-major) 2px,
        transparent 2px, transparent var(--cell),
        var(--grid) var(--cell), var(--grid) calc(var(--cell) + 1px),
        transparent calc(var(--cell) + 1px), transparent calc(2*var(--cell)),
        var(--grid) calc(2*var(--cell)), var(--grid) calc(2*var(--cell) + 1px),
        transparent calc(2*var(--cell) + 1px), transparent calc(3*var(--cell)),
        var(--grid) calc(3*var(--cell)), var(--grid) calc(3*var(--cell) + 1px),
        transparent calc(3*var(--cell) + 1px), transparent calc(4*var(--cell)),
        var(--grid) calc(4*var(--cell)), var(--grid) calc(4*var(--cell) + 1px),
        transparent calc(4*var(--cell) + 1px), transparent calc(5*var(--cell))),
      repeating-linear-gradient(to bottom,
        var(--grid-major) 0, var(--grid-major) 2px,
        transparent 2px, transparent var(--cell),
        var(--grid) var(--cell), var(--grid) calc(var(--cell) + 1px),
        transparent calc(var(--cell) + 1px), transparent calc(2*var(--cell)),
        var(--grid) calc(2*var(--cell)), var(--grid) calc(2*var(--cell) + 1px),
        transparent calc(2*var(--cell) + 1px), transparent calc(3*var(--cell)),
        var(--grid) calc(3*var(--cell)), var(--grid) calc(3*var(--cell) + 1px),
        transparent calc(3*var(--cell) + 1px), transparent calc(4*var(--cell)),
        var(--grid) calc(4*var(--cell)), var(--grid) calc(4*var(--cell) + 1px),
        transparent calc(4*var(--cell) + 1px), transparent calc(5*var(--cell)));
    min-height:100vh;
  }
  #root{
    /* width + left margin are snapped to whole cells in JS so the content
       column's edges land exactly on grid lines */
    max-width:calc(18*var(--cell));
    width:min(calc(18*var(--cell)), calc(100% - 2*var(--cell)));
    margin:0 auto;
    padding:calc(var(--cell)) calc(var(--cell)) calc(2*var(--cell));
  }
  @media(min-width:700px){
    #root{max-width:calc(36*var(--cell));}
  }
  @media(min-width:1200px){
    #root{max-width:calc(52*var(--cell));}
  }

  .accent{font-family:var(--accent);}

  /* ---------- header ---------- */
  .pf-head{display:flex;flex-direction:column;margin-bottom:calc(var(--cell));}
  @media(min-width:700px){
    .pf-head{display:grid;grid-template-columns:1fr auto;align-items:center;row-gap:calc(0.5*var(--cell));}
    .eyebrow{grid-column:1/-1;margin-bottom:0;}
    .id-row{margin-bottom:0;}
    .pf-head .gh{align-self:center;margin-top:0;}
  }
  .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--blue);
    display:flex;align-items:center;gap:9px;margin-bottom:calc(var(--cell));
  }
  .eyebrow::before,.eyebrow::after{content:"";height:1.5px;background:var(--blue);flex:none;}
  .eyebrow::before{width:18px;}
  .eyebrow::after{flex:1;opacity:.35;}
  .id-row{display:flex;align-items:center;gap:15px;margin-bottom:16px;}
  .avatar{
    width:62px;height:62px;border-radius:7px;border:2px solid var(--ink);
    background:var(--cream);display:grid;place-items:center;flex:none;
    box-shadow:3px 3px 0 rgba(20,34,59,.13);position:relative;overflow:hidden;
  }
  .avatar img{width:52px;height:52px;display:block;border-radius:50%;}
  .avatar .crn{position:absolute;width:7px;height:7px;border:1.6px solid var(--blue);z-index:2;}
  .avatar .crn.a{top:4px;left:4px;border-right:0;border-bottom:0;}
  .avatar .crn.b{bottom:4px;right:4px;border-left:0;border-top:0;}
  .pf-name{margin:0;font-size:33px;font-weight:700;line-height:1;letter-spacing:-.02em;}

  /* Profile button — sits on its own under the header.
     TODO: a repo metadata strip (count / last-updated) used to live here;
     removed for now, revisit. See CLAUDE.md. */
  .gh{
    /* margin-top:auto pushes the button to the header's snapped bottom edge, so
       its bottom lands on a grid line and the header's 1-cell bottom margin is
       the entire button-to-card gap. align-self keeps it at its content width. */
    display:inline-flex;align-items:center;gap:4px;align-self:flex-start;margin-top:auto;
    font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;
    border:2px solid var(--ink);border-radius:4px;padding:9px 15px;background:var(--cream);
    text-decoration:none;color:var(--ink);box-shadow:2px 2px 0 rgba(20,34,59,.14);white-space:nowrap;
  }
  .gh:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}
  @media (hover:hover) and (pointer:fine){
    .gh{transition:transform .14s ease;}
    .gh:hover{transform:translate(-1px,-1px);}
  }

  /* ---------- cards ---------- */
  .cards{display:grid;grid-template-columns:1fr;gap:calc(var(--cell));}
  @media(min-width:700px){
    .cards{grid-template-columns:repeat(auto-fill,minmax(calc(16*var(--cell)),1fr));}
  }
  .card{
    background:var(--cream);border:2px solid var(--ink);border-radius:5px;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr auto auto;
    overflow:hidden;position:relative;
    box-shadow:3px 3px 0 rgba(20,34,59,.14);
  }
  .card .tick{position:absolute;width:11px;height:11px;border:2px solid var(--blue);z-index:5;pointer-events:none;}
  .card .tick.tl{top:-2px;left:-2px;border-right:none;border-bottom:none;}
  .card .tick.tr{top:-2px;right:-2px;border-left:none;border-bottom:none;}
  .card .tick.bl{bottom:-2px;left:-2px;border-right:none;border-top:none;}
  .card .tick.br{bottom:-2px;right:-2px;border-left:none;border-top:none;}
  .idx{position:absolute;bottom:8px;right:11px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:#94a0b5;z-index:4;}

  .prev{
    border-right:1.6px solid var(--ink);position:relative;
    min-height:calc(6*var(--cell));overflow:hidden;
    display:grid;place-items:center;
    background-color:#eef2f8;
    background-image:
      repeating-linear-gradient(135deg,#dce3ee 0 1px,transparent 1px 11px),
      repeating-linear-gradient(45deg,#e6ebf3 0 1px,transparent 1px 11px);
  }
  @media(min-width:700px){
    .prev{min-height:calc(8*var(--cell));}
  }
  .ico{width:100%;height:100%;display:grid;place-items:center;}
  .lineicon{width:64px;height:64px;fill:none;stroke:var(--ink);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .lineicon .acc{fill:var(--blue);stroke:var(--blue);}
  .lineicon .acc-stroke{stroke:var(--blue);}
  .body{padding:calc(0.5*var(--cell));display:flex;flex-direction:column;justify-content:flex-start;}
  .ctitle{font-size:22px;font-weight:700;line-height:1.04;letter-spacing:-.015em;margin:0;}
  @media(min-width:700px){
    .ctitle{font-size:24px;}
  }
  .cdesc{margin:0 0 calc(0.5*var(--cell));font-family:var(--accent);font-size:calc(17px*var(--accent-size));line-height:1.3;color:var(--ink-soft);}

  .link-deploy,.link-repo{
    border-top:1.6px solid var(--ink);
    display:flex;align-items:center;justify-content:center;gap:5px;
    font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink);text-decoration:none;
    padding:9px 8px;background-color:var(--cream);
  }
  .link-deploy{border-right:1.6px solid var(--ink);}
  @media (hover:hover) and (pointer:fine){
    .link-deploy,.link-repo{transition:background .12s ease,color .12s ease;}
    .link-deploy:hover,.link-repo:hover{background:var(--blue-soft);color:var(--blue);}
  }
  .link-deploy:focus-visible,.link-repo:focus-visible{outline:3px solid var(--blue);outline-offset:-3px;}

  .spec{
    grid-column:1 / -1;border-top:1.6px solid var(--ink);
    font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--ink-soft);
    padding:7px 13px;display:flex;gap:16px;flex-wrap:wrap;background:var(--cream-2);align-items:center;
  }
  .spec b{color:var(--ink);font-weight:700;}
  .spec .dot{width:7px;height:7px;border-radius:50%;background:var(--blue);display:inline-block;margin-right:5px;vertical-align:middle;}

</style>
<script>
  /* Blueprint grid fit: pick the integer number of columns closest to the
     target cell size, then stretch the cell to fill the viewport exactly. The
     content column's width and left offset are snapped to whole cells so its
     edges sit on grid lines. */
  (function(){
    var TARGET = 26;
    function fit(){
      var w = document.documentElement.clientWidth; // excludes scrollbar
      var cols = Math.max(1, Math.round(w / TARGET));
      var cell = w / cols;
      document.documentElement.style.setProperty('--cell', cell + 'px');
      var root = document.getElementById('root');
      if (root){
        var maxCells = w >= 1200 ? 52 : w >= 700 ? 36 : 18;
        var width = Math.min(maxCells * cell, w - 2 * cell);
        var margin = Math.round((w - width) / 2 / cell) * cell;
        root.style.width = width + 'px';
        root.style.marginLeft = margin + 'px';
        root.style.marginRight = 'auto';
      }
    }
    window.fitGrid = fit;
    window.addEventListener('resize', fit);
    if (document.readyState !== 'loading') fit();
    else document.addEventListener('DOMContentLoaded', fit);
  })();
</script>
</head>
<body>
  <div id="root">
    <header class="pf-head" data-snap>
      <div class="eyebrow">Repository Index</div>
      <div class="id-row">
        <div class="avatar">
          <span class="crn a"></span>
          <img src="quickglobe-avatar.svg" alt="" aria-hidden="true">
          <span class="crn b"></span>
        </div>
        <div>
          <h1 class="pf-name">quickglobe</h1>
        </div>
      </div>
      <a class="gh" href="https://github.com/quickglobe" target="_blank" rel="noopener">PROFILE &nearr;</a>
    </header>

    <main class="cards" id="cards"></main>
  </div>

<script>
  /* ── Repositories ───────────────────────────────────────────────
     One entry per card, in display order. `updated` is the ISO date of
     the repo's last push; relative times ("3d", "2w", "1mo") are computed
     at load so the cards stay accurate. See ADDING-CARDS.md to add a repo. */
  const REPOS = [
    { id:"blob-squish", title:"blob-squish", cat:"Game", code:"R-01",
      desc:"Repository for blob-squish.com — a squishy little browser game.",
      lang:"HTML", updated:"2026-05-26", icon:"blob",
      deployed:"https://blob-squish.com",
      url:"https://github.com/quickglobe/blob-squish" },
    { id:"playground", title:"playground", cat:"Experiments", code:"R-02",
      desc:"Playground for random experiments and tests.",
      lang:"HTML", updated:"2026-06-02", icon:"play",
      deployed:"https://quickglobe.github.io/playground",
      url:"https://github.com/quickglobe/playground" },
    { id:"cheat-sheets", title:"Cheat-Sheets", cat:"Reference", code:"R-03",
      desc:"Collection of quick reference sheets for things I'm learning about.",
      lang:"HTML", updated:"2026-06-01", icon:"sheets",
      deployed:"https://quickglobe.github.io/Cheat-Sheets",
      url:"https://github.com/quickglobe/Cheat-Sheets" },
  ];

  /* ── Line icons · single-stroke drafting style (48x48 viewBox) ── */
  const ICONS = {
    globe: `<svg viewBox="0 0 48 48" class="lineicon"><circle cx="24" cy="24" r="18"/><ellipse cx="24" cy="24" rx="8" ry="18"/><line x1="6" y1="24" x2="42" y2="24"/><path d="M9 14 H39"/><path d="M9 34 H39"/><circle cx="24" cy="24" r="2.2" class="acc"/></svg>`,
    blob: `<svg viewBox="0 0 48 48" class="lineicon"><circle cx="24" cy="24" r="18" class="acc-stroke"/><circle cx="18" cy="19" r="2.4"/><circle cx="30" cy="19" r="2.4"/><path d="M18 28 Q24 32 30 28"/></svg>`,
    play: `<svg viewBox="0 0 48 48" class="lineicon"><rect x="6" y="6" width="36" height="36" rx="2"/><circle cx="17" cy="17" r="6" class="acc"/><path d="M31 11 L39 23 H23 Z"/><rect x="27" y="28" width="11" height="11"/></svg>`,
    sheets: `<svg viewBox="0 0 48 48" class="lineicon"><rect x="13" y="6" width="24" height="30" rx="1.5"/><rect x="8" y="11" width="24" height="30" rx="1.5" class="acc-stroke"/><line x1="13" y1="19" x2="27" y2="19"/><line x1="13" y1="25" x2="27" y2="25"/><line x1="13" y1="31" x2="22" y2="31"/></svg>`,
  };

  /* Relative time, e.g. "today", "3d", "2w", "5mo", "1y". */
  function relShort(iso){
    const days = Math.floor((Date.now() - new Date(iso + "T00:00:00Z").getTime()) / 86400000);
    if (days <= 0) return "today";
    if (days < 7)  return days + "d";
    if (days < 30) return Math.max(1, Math.round(days / 7)) + "w";
    if (days < 365) return Math.max(1, Math.round(days / 30)) + "mo";
    return Math.max(1, Math.round(days / 365)) + "y";
  }
  function escapeHTML(s){
    return s.replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
  }

  function cardHTML(r){
    const icon = ICONS[r.icon] || ICONS.globe;
    return `
      <span class="tick tl"></span><span class="tick tr"></span>
      <span class="tick bl"></span><span class="tick br"></span>
      <span class="idx">${escapeHTML(r.code)}</span>
      <div class="prev"><div class="ico">${icon}</div></div>
      <div class="body">
        <h2 class="ctitle">${escapeHTML(r.title)}</h2>
        <p class="cdesc">${escapeHTML(r.desc)}</p>
      </div>
      <a class="link-deploy" href="${escapeHTML(r.deployed)}" target="_blank" rel="noopener">Deployed &nearr;</a>
      <a class="link-repo" href="${escapeHTML(r.url)}" target="_blank" rel="noopener">Repo &nearr;</a>
      <div class="spec">
        <span><span class="dot"></span><b>${escapeHTML(r.lang)}</b></span>
        <span>upd ${relShort(r.updated)}</span>
        <span>${escapeHTML(r.cat.toLowerCase())}</span>
      </div>`;
  }

  const cards = document.getElementById("cards");
  REPOS.forEach(r => {
    const a = document.createElement("div");
    a.className = "card";
    a.setAttribute("data-snap", "");
    a.innerHTML = cardHTML(r);
    cards.appendChild(a);
  });

  /* Snap to grid: round each top-level block's height up to a whole number of
     cells. The gaps between blocks (root top padding, the header's bottom
     margin, the cards gap) are all already 1 cell, so once every
     block is a whole number of cells tall, every block boundary — top and
     bottom — lands on a grid line. */
  function snapBlocks(){
    var cell = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--cell"));
    if (!cell) return;
    document.querySelectorAll("[data-snap]").forEach(function(el){
      el.style.minHeight = "0";                       // reset before measuring
      var h = el.getBoundingClientRect().height;
      el.style.minHeight = (Math.ceil(h / cell) * cell) + "px";
    });
  }

  function relayout(){ if (window.fitGrid) window.fitGrid(); snapBlocks(); }
  window.addEventListener("resize", relayout);
  relayout();
  // Re-snap once web fonts have loaded, since text wrapping changes heights.
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(relayout);
</script>
</body>
</html>
