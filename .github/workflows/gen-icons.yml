name: Generate Icons

on:
  push:
    branches:
      - main
    paths:
      - 'favicon.svg'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gen-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Python deps
        run: pip install cairosvg pillow

      - name: Generate icons
        run: python3 .github/scripts/gen-icons.py

      - name: Commit icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add favicon-16x16.png favicon-32x32.png favicon-48x48.png favicon.ico \
                  apple-touch-icon.png android-chrome-192x192.png android-chrome-512x512.png
          git diff --staged --quiet || git commit -m "chore: regenerate icon set from favicon.svg"
          git push
